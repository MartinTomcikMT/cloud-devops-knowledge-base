<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloud / DevOps Knowledge Base</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --accent: #38bdf8;
      --accent2: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --card: #020617;
      --code: #0b1220;
      --shadow: 0 14px 40px rgba(0,0,0,.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(56,189,248,.13), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(34,197,94,.09), transparent 25%),
        
        var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      position: relative;
      min-height: 390px;
      display: flex;
      align-items: center;
      z-index: 1;
      padding: 50px 24px 40px;
      border-bottom: 1px solid rgba(56,189,248,.26);
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,.46);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("./devops-hero.png") right center / cover no-repeat;
      z-index: -1;
}

    .hero-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 16% 34%, rgba(56,189,248,.22), transparent 30%),
        radial-gradient(circle at 82% 28%, rgba(34,197,94,.13), transparent 26%),
        linear-gradient(180deg, transparent 0%, rgba(15,23,42,.94) 100%);
    }

    .hero-inner {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      margin: 0 0 12px;
    }

    .hero-title {
      padding: 0;
      border: 0;
      background: transparent;
      color: #e0f7ff;
      font-size: clamp(34px, 5.6vw, 76px);
      font-weight: 950;
      letter-spacing: -0.065em;
      line-height: .95;
      text-align: left;
      cursor: pointer;
      text-shadow:
        0 0 12px rgba(56,189,248,.64),
        0 0 34px rgba(56,189,248,.38),
        0 0 76px rgba(34,197,94,.18);
    }

    .hero-title:hover {
      color: #ffffff;
      transform: none;
      filter: drop-shadow(0 0 18px rgba(56,189,248,.48));
    }

    .hero-subtitle {
      margin: 0;
      max-width: 920px;
      color: #dbeafe;
      font-size: clamp(15px, 1.5vw, 18px);
      text-shadow: 0 1px 16px rgba(0,0,0,.8);
    }

    .hero-notice {
      margin-top: 18px;
      max-width: 920px;
      padding: 12px 14px;
      border: 1px solid rgba(56,189,248,.28);
      background: rgba(2,6,23,.58);
      border-radius: 14px;
      color: #bae6fd;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    main.app-layout {
      padding: 24px 0 64px;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 230px;
      gap: 18px;
      align-items: start;
    }

    .side-panel,
    .center-panel {
      min-width: 0;
    }

    .panel-card {
      border: 1px solid var(--line);
      background: rgba(17,24,39,.86);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .sticky-panel {
      position: sticky;
      top: 18px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 14px;
      color: #bfdbfe;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .menu-title {
      margin-top: 18px;
    }

    input,
    textarea,
    select,
    button {
      font: inherit;
    }

    input,
    textarea,
    select {
      width: 100%;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,.14);
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 14px;
      transition: .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .primary {
      background: linear-gradient(135deg, #0284c7, #16a34a);
      border: 0;
      font-weight: 700;
    }

    .danger {
      border-color: rgba(239,68,68,.45);
      color: #fecaca;
      background: rgba(239,68,68,.12);
    }

    .left-panel input,
    .left-panel select {
      margin-bottom: 10px;
    }

    .side-nav {
      margin: 0;
      display: grid;
      gap: 7px;
      padding-top: 0;
      border-top: 0;
    }

    .nav-btn {
      width: 100%;
      text-align: left;
      padding: 9px 11px;
      border-radius: 11px;
      color: var(--muted);
      background: rgba(31,41,55,.75);
    }

    .nav-btn.active {
      color: #02131f;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      border-color: transparent;
      font-weight: 850;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 0;
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(2,6,23,.62);
      border-radius: 15px;
      padding: 13px;
      box-shadow: none;
    }

    .stat strong {
      display: block;
      font-size: 25px;
      color: white;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .study-tip {
      margin-top: 14px;
      padding: 13px;
      border: 1px solid rgba(34,197,94,.28);
      background: rgba(34,197,94,.08);
      border-radius: 15px;
    }

    .study-tip strong {
      display: block;
      color: #bbf7d0;
      margin-bottom: 5px;
    }

    .study-tip p {
      margin: 0;
      color: #d1fae5;
      font-size: 13px;
    }

    .section {
      margin: 0 0 28px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;
    }

    .section-desc {
      margin: 4px 0 0;
      color: var(--muted);
      max-width: 850px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    details.card {
      border: 1px solid var(--line);
      background: rgba(2,6,23,.78);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    details.card[open] {
      border-color: rgba(56,189,248,.55);
    }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 15px 16px;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .title strong {
      font-size: 17px;
    }

    .tagline {
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      white-space: nowrap;
      font-size: 12px;
      color: #bae6fd;
      border: 1px solid rgba(56,189,248,.35);
      background: rgba(56,189,248,.08);
      padding: 5px 9px;
      border-radius: 999px;
    }

    .content {
      border-top: 1px solid var(--line);
      padding: 15px 16px 17px;
      background: rgba(15,23,42,.56);
    }

    .block {
      margin: 0 0 15px;
    }

    .block h3 {
      margin: 0 0 7px;
      font-size: 14px;
      color: #bfdbfe;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .block p {
      margin: 0;
      color: #d1d5db;
    }

    ul {
      margin: 8px 0 0 20px;
      padding: 0;
    }

    li {
      margin: 5px 0;
    }

    code {
      background: var(--code);
      color: #a7f3d0;
      border: 1px solid rgba(167,243,208,.18);
      border-radius: 6px;
      padding: 2px 5px;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
    }

    .questions li {
      color: #fef3c7;
    }

    .tracker {
      border: 1px solid var(--line);
      background: rgba(17,24,39,.86);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-top: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr .6fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 0;
    }

    .question-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .saved-q {
      border: 1px solid var(--line);
      background: rgba(2,6,23,.64);
      border-radius: 14px;
      padding: 13px;
    }

    .saved-q header {
      position: static;
      padding: 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .saved-q h3 {
      margin: 0;
      font-size: 16px;
    }

    .saved-q .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .saved-q p {
      margin: 9px 0 0;
      color: #d1d5db;
      white-space: pre-wrap;
    }

    .empty {
      color: var(--muted);
      padding: 16px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      text-align: center;
    }

    footer {
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding: 26px 0 42px;
      font-size: 14px;
    }

    @media (max-width: 1180px) {
      .app-layout {
        grid-template-columns: 230px minmax(0, 1fr);
      }

      .right-panel {
        display: none;
      }
    }

    @media (max-width: 820px) {
      .hero {
        min-height: 300px;
        padding: 38px 18px 32px;
        background-position: 63% center;
      }

      .app-layout {
        grid-template-columns: 1fr;
      }

      .sticky-panel {
        position: static;
      }

      .side-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .nav-btn {
        width: auto;
        text-align: center;
        border-radius: 999px;
      }

      .right-panel {
        display: block;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .summary-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .badge {
        white-space: normal;
      }
    }

    @media print {
      body {
        background: white;
        color: black;
      }

      .hero,
      .left-panel,
      .right-panel,
      .tracker,
      footer {
        display: none;
      }

      .app-layout {
        display: block;
      }

      details.card {
        break-inside: avoid;
        border-color: #bbb;
        background: white;
        box-shadow: none;
      }

      details.card:not([open]) .content {
        display: block;
      }

      .content {
        background: white;
      }

      .badge,
      .tagline,
      .section-desc {
        color: #333;
      }
    }
  </style>
</head>

<body>
  <header class="hero">
    <div class="hero-overlay"></div>

    <div class="wrap hero-inner">
      <h1>
        <button id="homeReset" class="hero-title">
          Cloud / DevOps <br>Knowledge Base
        </button>
      </h1>

      <p class="hero-subtitle">
        Overview for Azure, AWS, CI/CD, Terraform, Kubernetes, Docker, <br>Windows, Linux, Networking and Git.
      </p>

  
    </div>
  </header>

  <main class="wrap app-layout">
    <aside class="side-panel left-panel">
      <div class="panel-card sticky-panel">
        <h2 class="panel-title">Vyhľadávanie</h2>

        <input id="search" placeholder="Hľadaj napr. AKS, IAM, subnet, Dockerfile..." />

        <select id="openMode">
          <option value="normal">Klikateľné karty</option>
          <option value="open">Otvoriť všetko</option>
          <option value="closed">Zavrieť všetko</option>
        </select>

        <h2 class="panel-title menu-title">Menu tém</h2>
        <nav id="nav" class="side-nav"></nav>
      </div>
    </aside>

    <section class="center-panel">
      <div id="content"></div>

      <section class="tracker" id="moje-otazky">
        <h2>Questions & Answers</h2>
        

        <div class="form-grid" style="margin-top:16px;">
          <input id="qArea" placeholder="Oblasť: napr. Kubernetes, AWS IAM, Terraform" />
          <input id="qText" placeholder="Otázka z pohovoru" />
          <select id="qStatus">
            <option value="Neviem">Neviem</option>
            <option value="Čiastočne">Čiastočne</option>
            <option value="Zvládam">Zvládam</option>
          </select>
        </div>

        <textarea id="qAnswer" placeholder="Moja poznámka / správna odpoveď / čo si mám zopakovať"></textarea>

        <div class="actions">
          <button class="primary" id="addQuestion">Add question</button>
          <button id="exportQuestions">Export JSON</button>
          <button class="danger" id="clearQuestions">Remove all questions</button>
        </div>

        <div class="question-list" id="questionList"></div>
      </section>
    </section>

    <aside class="side-panel right-panel">
      <div class="panel-card sticky-panel">
        <h2 class="panel-title">Prehľad</h2>
        <section class="stats" id="stats"></section>

        
      </div>
    </aside>
  </main>

  <footer>
    <div class="wrap">
      Tip: použi vyhľadávanie vľavo alebo Ctrl+F v prehliadači. Pri učení si otvor kartu a skús odpovedať vlastnými slovami.
    </div>
  </footer>

    let activeGroup = "Všetko";

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function list(items, cls = "") {
      return `<ul class="${cls}">${(items || []).map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function matches(item, group, query) {
      const q = query.trim().toLowerCase();

      if (activeGroup !== "Všetko" && group !== activeGroup) {
        return false;
      }

      if (!q) {
        return true;
      }

      const haystack = [
        group,
        item.name,
        item.type,
        item.what,
        item.use,
        ...(item.remember || []),
        ...(item.questions || [])
      ].join(" ").toLowerCase();

      return haystack.includes(q);
    }

    function renderNav() {
      const nav = document.getElementById("nav");
      const groups = ["Všetko", ...DATA.map(section => section.group), "Q & A"];

      nav.innerHTML = groups.map(group => `
        <button class="nav-btn ${group === activeGroup ? "active" : ""}" data-group="${escapeHtml(group)}">
          ${escapeHtml(group)}
        </button>
      `).join("");

      nav.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          const group = btn.dataset.group;

          if (group === "Q & A") {
            document.getElementById("moje-otazky").scrollIntoView({ behavior: "smooth" });
            return;
          }

          activeGroup = group;
          render();
          window.scrollTo({ top: document.querySelector("main").offsetTop - 10, behavior: "smooth" });
        });
      });
    }

    function renderStats(visibleCount) {
      const totalItems = DATA.reduce((sum, section) => sum + section.items.length, 0);
      const azure = DATA.find(x => x.group === "Azure")?.items.length || 0;
      const aws = DATA.find(x => x.group === "AWS")?.items.length || 0;

      document.getElementById("stats").innerHTML = `
        <div class="stat">
          <strong>${totalItems}</strong>
          <span>tém a služieb v databáze</span>
        </div>
        <div class="stat">
          <strong>${azure}</strong>
          <span>Azure kariet</span>
        </div>
        <div class="stat">
          <strong>${aws}</strong>
          <span>AWS kariet</span>
        </div>
        <div class="stat">
          <strong>${visibleCount}</strong>
          <span>aktuálne zobrazených výsledkov</span>
        </div>
      `;
    }

    function renderCard(item) {
      const mode = document.getElementById("openMode").value;
      const openAttr = mode === "open" ? "open" : "";

      return `
        <details class="card" ${openAttr}>
          <summary>
            <div class="summary-row">
              <div class="title">
                <strong>${escapeHtml(item.name)}</strong>
                <span class="tagline">${escapeHtml(item.what)}</span>
              </div>
              <span class="badge">${escapeHtml(item.type)}</span>
            </div>
          </summary>

          <div class="content">
            <div class="block">
              <h3>Čo to robí</h3>
              <p>${escapeHtml(item.what)}</p>
            </div>

            <div class="block">
              <h3>Kedy sa používa</h3>
              <p>${escapeHtml(item.use)}</p>
            </div>

            <div class="block">
              <h3>Zapamätať si</h3>
              ${list(item.remember)}
            </div>

            <div class="block">
              <h3>Možné otázky na pohovore</h3>
              ${list(item.questions, "questions")}
            </div>
          </div>
        </details>
      `;
    }

    function render() {
      renderNav();

      const query = document.getElementById("search").value;
      let visibleCount = 0;

      const html = DATA.map(section => {
        const visibleItems = section.items.filter(item => matches(item, section.group, query));
        visibleCount += visibleItems.length;

        if (!visibleItems.length) {
          return "";
        }

        return `
          <section class="section" id="${escapeHtml(section.group.toLowerCase().replaceAll(" ", "-"))}">
            <div class="section-head">
              <div>
                <h2>${escapeHtml(section.group)}</h2>
                <p class="section-desc">${escapeHtml(section.desc)}</p>
              </div>
              <span class="badge">${visibleItems.length} položiek</span>
            </div>

            <div class="grid">
              ${visibleItems.map(renderCard).join("")}
            </div>
          </section>
        `;
      }).join("");

      document.getElementById("content").innerHTML = html || `
        <div class="empty">
          Nič sa nenašlo. Skús iný výraz, napríklad subnet, IAM, AKS, Terraform, DNS alebo Docker.
        </div>
      `;

      renderStats(visibleCount);
    }

    const STORAGE_KEY = "interview_questions_sk_v1";

    function loadQuestions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveQuestions(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function renderQuestions() {
      const listEl = document.getElementById("questionList");
      const items = loadQuestions();

      if (!items.length) {
        listEl.innerHTML = `<div class="empty">Zatiaľ nemáš uložené vlastné otázky.</div>`;
        return;
      }

      listEl.innerHTML = items.map((item, index) => `
        <article class="saved-q">
          <header>
            <div>
              <h3>${escapeHtml(item.question)}</h3>
              <div class="meta">
                ${escapeHtml(item.area || "Bez oblasti")} · ${escapeHtml(item.status)} · ${escapeHtml(item.date)}
              </div>
            </div>

            <button class="danger" data-delete="${index}">Zmazať</button>
          </header>

          <p>${escapeHtml(item.answer || "Bez poznámky.")}</p>
        </article>
      `).join("");

      listEl.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.delete);
          const items = loadQuestions();
          items.splice(index, 1);
          saveQuestions(items);
          renderQuestions();
        });
      });
    }

    document.getElementById("addQuestion").addEventListener("click", () => {
      const area = document.getElementById("qArea").value.trim();
      const question = document.getElementById("qText").value.trim();
      const answer = document.getElementById("qAnswer").value.trim();
      const status = document.getElementById("qStatus").value;

      if (!question) {
        alert("Doplň otázku z pohovoru.");
        return;
      }

      const items = loadQuestions();

      items.unshift({
        area,
        question,
        answer,
        status,
        date: new Date().toLocaleString("sk-SK")
      });

      saveQuestions(items);

      document.getElementById("qArea").value = "";
      document.getElementById("qText").value = "";
      document.getElementById("qAnswer").value = "";
      document.getElementById("qStatus").value = "Neviem";

      renderQuestions();
    });

    document.getElementById("exportQuestions").addEventListener("click", () => {
      const data = JSON.stringify(loadQuestions(), null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "moje-interview-otazky.json";
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    });

    document.getElementById("clearQuestions").addEventListener("click", () => {
      if (!confirm("Naozaj chceš vymazať všetky vlastné otázky?")) {
        return;
      }

      saveQuestions([]);
      renderQuestions();
    });

    document.getElementById("homeReset").addEventListener("click", () => {
      activeGroup = "Všetko";
      document.getElementById("search").value = "";
      document.getElementById("openMode").value = "normal";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("openMode").addEventListener("change", render);

    render();
    renderQuestions();
  </script>
</body>
